workflows:
  ios-swift-workflow:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_profiles:
          - DNTWEAKS_PROFILE  # Thay bằng Reference Name của Provisioning Profile trên Codemagic
        bundle_identifier: com.yourcompany.dntweaks # Thay bằng Bundle Identifier chính xác của dự án
    scripts:
      - name: Initialize Keychain and Install Profiles
        script: |
          # Khởi tạo keychain và cài đặt profile/cert từ Codemagic vào máy build
          keychain initialize
          xcode-project install-profiles

      - name: Build iOS App & Export IPA
        script: |
          # 1. Định nghĩa các đường dẫn
          ARCHIVE_PATH="$HOME/build/DNTWEAKS.xcarchive"
          OUTPUT_DIR="$HOME/build/output"
          EXPORT_OPTIONS="$HOME/build/exportOptions.plist"

          mkdir -p "$OUTPUT_DIR"

          # 2. Build file Archive (.xcarchive)
          xcodebuild archive \
            -project "DNTWEAKS.xcodeproj" \
            -scheme "DNTWEAKS" \
            -archivePath "$ARCHIVE_PATH" \
            -sdk iphoneos \
            -configuration Release

          # 3. Tạo file exportOptions.plist cấu hình xuất IPA
          cat <<EOF > "$EXPORT_OPTIONS"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          # 4. ExportArchive để tạo file .ipa đã được ký số
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -exportPath "$OUTPUT_DIR"

    artifacts:
      - $HOME/build/output/*.ipa
