workflows:
  ios-swift-workflow:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build iOS App
        script: |
          xcodebuild archive \
            -project "DNTWEAKS.xcodeproj" \
            -scheme "DNTWEAKS" \
            -archivePath "$HOME/build/DNTWEAKS.xcarchive" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/build/DNTWEAKS.xcarchive
