workflows:
  ios-swift-workflow:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - DN
        certificates:
          - DN
    scripts:
      - name: Set up Code Signing
        script: |
          xcode-project use-profiles
          
          # Tìm file .mobileprovision của profile DN để lấy UUID chuẩn
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -n 1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 "UUID" | string -tag string | sed 's/<[^>]*>//g' | xargs)
          
          echo "Profile UUID found: $PROFILE_UUID"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build IPA via xcodebuild
        script: |
          xcodebuild archive \
            -project "DNTWEAKS.xcodeproj" \
            -scheme "DNTWEAKS" \
            -archivePath "build/ios/xcarchive/DNTWEAKS.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcode-project package-app \
            --archive "build/ios/xcarchive/DNTWEAKS.xcarchive" \
            --export-package-path "build/ios/ipa/DNTWEAKS.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
