workflows:
  ios-swift-workflow:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build iOS App & Export Unsigned IPA
        script: |
          # 1. Định nghĩa thư mục
          ARCHIVE_PATH="$HOME/build/DNTWEAKS.xcarchive"
          OUTPUT_DIR="$HOME/build/output"
          PAYLOAD_DIR="$HOME/build/Payload"

          mkdir -p "$OUTPUT_DIR"
          mkdir -p "$PAYLOAD_DIR"

          # 2. Build Archive (Không ký số)
          xcodebuild archive \
            -project "DNTWEAKS.xcodeproj" \
            -scheme "DNTWEAKS" \
            -archivePath "$ARCHIVE_PATH" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 3. Copy file .app vào thư mục Payload và nén thành .ipa
          cp -R "$ARCHIVE_PATH/Products/Applications/"*.app "$PAYLOAD_DIR/"
          cd $HOME/build
          zip -qr "$OUTPUT_DIR/DNTWEAKS.ipa" Payload

    artifacts:
      - $HOME/build/output/*.ipa
