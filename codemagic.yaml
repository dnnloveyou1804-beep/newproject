workflows:
  ios-swift-workflow:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - DN
        certificates:
          - DN
    scripts:
      - name: Set up Code Signing Profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA via Codemagic CLI
        script: |
          xcode-project build-ipa \
            --project "DNTWEAKS.xcodeproj" \
            --scheme "DNTWEAKS"

    artifacts:
      - build/ios/ipa/*.ipa
